name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUNDLE="build/linux/x64/release/bundle"
          PKG="build/linux/karnama_$VERSION"
          mkdir -p "$PKG/DEBIAN" "$PKG/usr/bin" "$PKG/usr/share/applications" "$PKG/usr/share/karnama"
          cp -r "$BUNDLE"/* "$PKG/usr/share/karnama/"
          printf '#!/bin/sh\nexec /usr/share/karnama/karnama "$@"\n' > "$PKG/usr/bin/karnama"
          chmod +x "$PKG/usr/bin/karnama"
          printf '[Desktop Entry]\nName=Karnama\nComment=Karnama Application\nExec=/usr/bin/karnama\nType=Application\nCategories=Utility;\nTerminal=false\n' > "$PKG/usr/share/applications/karnama.desktop"
          printf 'Package: karnama\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: Karnama Team\nDescription: Karnama application\nDepends: libgtk-3-0, libayatana-appindicator3-1\n' "$VERSION" > "$PKG/DEBIAN/control"
          dpkg-deb --build "$PKG" "build/linux/karnama_${VERSION}_amd64.deb"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: karnama-linux
          path: build/linux/karnama_*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create Windows installer
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v'
          choco install innosetup --no-progress -y
          $iss = @"
#define MyAppName "Karnama"
#define MyAppVersion "$VERSION"
#define MyAppPublisher "Mohammadooshesh"
#define MyAppURL "https://github.com/mohammadpooshesh/karnama"

[Setup]
AppName={#MyAppName}
AppVersion={#MyAppVersion}
AppPublisher={#MyAppPublisher}
AppPublisherURL={#MyAppURL}
DefaultDirName={autopf}\{#MyAppName}
DefaultGroupName={#MyAppName}
OutputDir=build\windows
OutputBaseFilename=karnama-$VERSION-windows
Compression=lzma
SolidCompression=yes
UninstallDisplayIcon={app}\karnama.exe

[Files]
Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

[Icons]
Name: "{group}\Karnama"; Filename: "{app}\karnama.exe"
Name: "{group}\Uninstall Karnama"; Filename: "{uninstallexe}"
"@
          $iss | Set-Content -Path "installer.iss"
          $iscc = (Get-Command "ISCC.exe" -ErrorAction SilentlyContinue).Source
          if (-not $iscc) { $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          & $iscc installer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: karnama-windows
          path: build/windows/karnama-*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: karnama-linux
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: karnama-windows
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.deb
            artifacts/*.exe
