name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUNDLE="build/linux/x64/release/bundle"
          PKG="build/linux/karnama_$VERSION"
          mkdir -p "$PKG/DEBIAN"
          mkdir -p "$PKG/usr/bin"
          mkdir -p "$PKG/usr/share/applications"
          mkdir -p "$PKG/usr/share/karnama"
          cp -r "$BUNDLE"/* "$PKG/usr/share/karnama/"
          cat > "$PKG/usr/bin/karnama" << 'SCRIPT'
#!/bin/sh
exec /usr/share/karnama/karnama "$@"
SCRIPT
          chmod +x "$PKG/usr/bin/karnama"
          cat > "$PKG/usr/share/applications/karnama.desktop" << DESKTOP
[Desktop Entry]
Name=Karnama
Comment=Karnama Application
Exec=/usr/bin/karnama
Type=Application
Categories=Utility;
Terminal=false
DESKTOP
          cat > "$PKG/DEBIAN/control" << CONTROL
Package: karnama
Version: $VERSION
Section: utils
Priority: optional
Architecture: amd64
Maintainer: Karnama Team
Description: Karnama application
Depends: libgtk-3-0, libayatana-appindicator3-1
CONTROL
          dpkg-deb --build "$PKG" "build/linux/karnama_${VERSION}_amd64.deb"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: karnama-linux
          path: build/linux/karnama_*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX installer
        run: |
          flutter pub global activate msix
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v'
          msix --create-certificate --install-certificate
          msix --build --version $VERSION --output-path build\windows\karnama-$VERSION-windows.msix

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: karnama-windows
          path: build/windows/karnama-*.msix

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: karnama-linux
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: karnama-windows
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.deb
            artifacts/*.msix
